<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatRPT</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-neutral-900 text-white overflow-x-hidden">
    <div class="container mx-auto max-w-3xl">

       <!-- user message here -->
        <div class="my-6 bg-neutral-800 p-3 rounded-xl ml-auto max-w-fit">
            <h1>Hey How Are you?</h1>
        </div>


        <!-- Ai messages here -->
         <div class="max-w-fit">
            <h1>hi i am fine you say something</h1>
         </div>


         <!-- bottom text area goes here -->
          <div class="fixed inset-x-0 bottom-0 flex items-center justify-center">
            <div class="bg-neutral-800 p-3 rounded-3xl w-full max-w-3xl">
            <textarea class="w-full resize-none outline-0 p-3 " rows="2"  id=""></textarea>
            <div class="flex items-center justify-end">
                <button class="bg-white px-4 py-1 text-black rounded-full cursor-pointer hover:bg-gray-300">Ask</button>
            </div>
          </div>
 
          </div>

    </div>


    

    <script src="./script.js"></script>
</body>
</html>
